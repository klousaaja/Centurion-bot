<!DOCTYPE html>
<html>
<head><title>Travian Raid Report</title></head>
<body>
<div id="report">
  <div class="troopInfos">
    <table id="attacker">
      <thead>
        <tr>
          <th>Attacker</th>
          <th class="uniticon"><img class="unit tribe3 u24" /></th>
          <th class="uniticon"><img class="unit tribe3 u25" /></th>
          <th class="uniticon"><img class="unit tribe3 u26" /></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="troopHeadline">Troops</td>
          <td class="unit">10</td>
          <td class="unit">5</td>
          <td class="unit">0</td>
        </tr>
        <tr class="dead">
          <td class="troopHeadline">Casualties</td>
          <td class="unit">2</td>
          <td class="unit">3</td>
          <td class="unit">0</td>
        </tr>
      </tbody>
    </table>
    <table id="defender">
      <thead>
        <tr>
          <th>Defender</th>
          <th class="uniticon"><img class="unit tribe1 u1" /></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="troopHeadline">Troops</td>
          <td class="unit">8</td>
        </tr>
        <tr class="dead">
          <td class="troopHeadline">Casualties</td>
          <td class="unit">8</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
